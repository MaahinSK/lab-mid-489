name: smart_landmarks
description: Smart Geo-Tagged Landmarks App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # State Management
  provider: ^6.1.1

  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # Maps
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^10.1.0

  # Image Handling
  image_picker: ^1.0.5

  # UI
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/